{% extends "base.html" %}
{% block title %}Server Status{% endblock %}

{% block content %}
<section class="section">
    <h1 class="page-title">Server <span class="accent">Status</span></h1>
    <p class="page-sub">Check real-time Valorant platform status and incidents for any region.</p>

    <div class="controls-row">
        <select id="sRegion" class="select-region">
            <option value="eu">EU</option>
            <option value="na">NA</option>
            <option value="ap">AP</option>
            <option value="kr">KR</option>
            <option value="br">BR</option>
            <option value="latam">LATAM</option>
        </select>
        <button class="btn btn-primary" id="sLoad">Check Status</button>
    </div>
</section>

<section id="statusResults" class="section hidden">
    <div id="statusCard"></div>
</section>

<div id="statusError" class="error-box hidden"></div>
<div id="statusLoading" class="loader hidden">Checking status...</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/status.js') }}"></script>
{% endblock %}
